<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechOps Central – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css"/>
</head>
<body class="login-body">
  <div class="login-bg">
    <div class="login-grid"></div>
  </div>

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-icon">⬡</div>
        <h1 class="login-title">TechOps Central</h1>
        <p class="login-sub">Operations Management Platform</p>
      </div>

      <div id="error-msg" class="error-banner" style="display:none"></div>

      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-input" placeholder="admin or user" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password"/>
        <span id="pw-err" class="field-error" style="display:none">Password is required</span>
      </div>

      <button class="btn-primary btn-full" id="login-btn" onclick="doLogin()">Sign In</button>

      <div class="login-hint">
        <strong>Test credentials:</strong><br/>
        Admin: <code>admin</code> / <code>admin123</code><br/>
        User: <code>user</code> / <code>user123</code>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    async function doLogin() {
      const btn = document.getElementById('login-btn');
      const errDiv = document.getElementById('error-msg');
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();
      errDiv.style.display = 'none';
      if (!u || !p) { errDiv.textContent = 'Please enter both username and password.'; errDiv.style.display = 'block'; return; }
      btn.textContent = 'Signing in…'; btn.disabled = true;
      const res = await fetch('/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username: u, password: p}) });
      const data = await res.json();
      if (data.success) { window.location = '/dashboard'; }
      else { errDiv.textContent = data.message; errDiv.style.display = 'block'; btn.textContent = 'Sign In'; btn.disabled = false; }
    }
  </script>
</body>
</html>
