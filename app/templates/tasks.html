{% extends "base.html" %}
{% block title %}Task Board{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Task Board</h1>
    <p class="page-sub">Drag tasks between columns to update status</p>
  </div>
  <button class="btn-primary" onclick="openTaskModal()">+ New Task</button>
</div>

<div class="kanban-board" id="kanban">
  <div class="kanban-col" id="col-todo" ondragover="allowDrop(event)" ondrop="dropTask(event,'To Do')">
    <div class="kanban-col-header">
      <span class="col-dot dot-todo"></span>
      <span class="col-title">To Do</span>
      <span class="col-count" id="count-todo">0</span>
    </div>
    <div class="kanban-cards" id="cards-todo"></div>
  </div>

  <div class="kanban-col" id="col-inprogress" ondragover="allowDrop(event)" ondrop="dropTask(event,'In Progress')">
    <div class="kanban-col-header">
      <span class="col-dot dot-ip"></span>
      <span class="col-title">In Progress</span>
      <span class="col-count" id="count-ip">0</span>
    </div>
    <div class="kanban-cards" id="cards-ip"></div>
  </div>

  <div class="kanban-col" id="col-done" ondragover="allowDrop(event)" ondrop="dropTask(event,'Done')">
    <div class="kanban-col-header">
      <span class="col-dot dot-done"></span>
      <span class="col-title">Done</span>
      <span class="col-count" id="count-done">0</span>
    </div>
    <div class="kanban-cards" id="cards-done"></div>
  </div>
</div>

<!-- Task Modal -->
<div class="modal-overlay" id="task-modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="task-modal-title">New Task</h2>
      <button class="modal-close" onclick="closeTaskModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="task-id"/>
      <div class="form-grid">
        <div class="form-group form-full">
          <label class="form-label">Task Title *</label>
          <input type="text" id="task-title" class="form-input" placeholder="What needs to be done?"/>
          <span class="field-error" id="err-task-title"></span>
        </div>
        <div class="form-group form-full">
          <label class="form-label">Description</label>
          <textarea id="task-desc" class="form-input" rows="2" placeholder="Optional details…"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Assignee *</label>
          <input type="text" id="task-assignee" class="form-input" placeholder="Team member name"/>
          <span class="field-error" id="err-task-assignee"></span>
        </div>
        <div class="form-group">
          <label class="form-label">Priority *</label>
          <select id="task-priority" class="form-select">
            <option>Low</option><option>Medium</option><option>High</option><option>Urgent</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Due Date *</label>
          <input type="date" id="task-due" class="form-input"/>
          <span class="field-error" id="err-task-due"></span>
        </div>
        <div class="form-group">
          <label class="form-label">Column</label>
          <select id="task-column" class="form-select">
            <option>To Do</option><option>In Progress</option><option>Done</option>
          </select>
        </div>
        <div class="form-group form-full">
          <label class="form-label">Linked Project</label>
          <select id="task-project" class="form-select"></select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeTaskModal()">Cancel</button>
      <button class="btn-primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<!-- Confirm delete -->
<div class="modal-overlay" id="confirm-modal" style="display:none">
  <div class="modal modal-sm">
    <div class="modal-header"><h2 class="modal-title">Confirm Delete</h2></div>
    <div class="modal-body"><p>Delete this task? This cannot be undone.</p></div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeConfirm()">Cancel</button>
      <button class="btn-danger" id="confirm-delete-btn">Delete</button>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}<script src="/static/js/tasks.js"></script>{% endblock %}
